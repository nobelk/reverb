name: SDK Python

on:
  # The smoke job is the release gate that proves the published `reverb`
  # client still works against a server built from the merge candidate
  # (see RUNBOOK.md §"SDK Release Coordination"). It must therefore run on
  # any change that can shift server behavior — not just SDK-local changes.
  # That means cmd/, pkg/, internal/, go.{mod,sum}, and the OpenAPI spec.
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "openapi/v1.yaml"
      - ".github/workflows/sdk-python.yml"
      - "cmd/reverb/**"
      - "pkg/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "openapi/v1.yaml"
      - ".github/workflows/sdk-python.yml"
      - "cmd/reverb/**"
      - "pkg/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        working-directory: sdk/python
        run: ruff check reverb tests
      - name: Type-check
        working-directory: sdk/python
        run: mypy reverb
      - name: Test
        working-directory: sdk/python
        run: pytest -v

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build reverb server
        run: go build -o bin/reverb ./cmd/reverb
      - name: Start reverb server
        run: |
          ./bin/reverb &
          echo $! > /tmp/reverb.pid
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done
      - name: Install Python SDK
        working-directory: sdk/python
        run: pip install -e .
      - name: Run smoke test
        working-directory: sdk/python
        env:
          REVERB_URL: http://localhost:8080
        run: python scripts/smoke_test.py
      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/reverb.pid ]; then
            kill "$(cat /tmp/reverb.pid)" 2>/dev/null || true
          fi
